<style>

    border-radius:10px; padding:10px 14px; max-width:260px;

  .node.dimmed { opacity:0.12; }
  .link { transition:stroke-opacity 0.2s; }
  .link.highlighted { stroke-opacity:0.9 !important; }
  .link.dimmed { stroke-opacity:0.04 !important; }
  .node-label { pointer-events:none; }
  .link-label { font-size:8px; fill:#555; pointer-events:none; }

}

function applyVisibility() {
  nodeSel.style('display', d => visible[d.type] ? null : 'none');
  linkSel.style('display', d => {
    const s = nodes.find(n=>n.id===d.source.id||n.id===d.source), t2=nodes.find(n=>n.id===d.target.id||n.id===d.target);
    const sv = visible[(d.source.type||'law')], tv = visible[(d.target.type||'law')];
    return sv && tv ? null : 'none';
  });
  linkLabelSel.style('display', d => {
    const sv = visible[(d.source.type||'law')], tv = visible[(d.target.type||'law')];
    return sv && tv ? null : 'none';
  });
}

// ── 클러스터 힘 ────────────────────────────────────────────────
function clusterForce(alpha) {
  nodes.forEach(d => {
    const c = clusters[d.group] || clusters.core;
    d.vx += (c.x - d.x) * alpha * 0.06;
    d.vy += (c.y - d.y) * alpha * 0.06;
  });
}

// ── Force 시뮬레이션 ──────────────────────────────────────────
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id)
    .distance(d => {
      if(d.source.type==='core'||d.target.type==='core') return 110;
      if(d.type==='regional') return 60;
      return 85;
    }).strength(0.5))
  .force('charge', d3.forceManyBody().strength(d => d.size * -22))
  .force('collision', d3.forceCollide(d => d.size + 10))
  .force('cluster', clusterForce)
  .force('x', d3.forceX(d => (clusters[d.group]||clusters.core).x).strength(0.08))
  .force('y', d3.forceY(d => (clusters[d.group]||clusters.core).y).strength(0.08));

// ── 화살표 마커 ────────────────────────────────────────────────
const defs = svg.append('defs');
Object.entries(linkStyle).forEach(([t, s]) => {
  defs.append('marker').attr('id',`arr-${t}`)
    .attr('viewBox','0 -5 10 10').attr('refX',20).attr('refY',0)
    .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
    .append('path').attr('d','M0,-5L10,0L0,5').attr('fill',s.color).attr('opacity',0.8);
});

// ── 링크 그리기 ────────────────────────────────────────────────
const linkSel = g.append('g').selectAll('line')
  .data(links).enter().append('line')
  .attr('class','link')
  .attr('stroke', d => linkStyle[d.type].color)
  .attr('stroke-width', d => linkStyle[d.type].width)
  .attr('stroke-dasharray', d => linkStyle[d.type].dash)
  .attr('stroke-opacity', 0.4)
  .attr('marker-end', d => `url(#arr-${d.type})`);

const linkLabelSel = g.append('g').selectAll('text')
  .data(links).enter().append('text')
  .attr('class','link-label')
  .text(d => d.label);

// ── 노드 그리기 ────────────────────────────────────────────────
const nodeSel = g.append('g').selectAll('.node')
  .data(nodes).enter().append('g')
  .attr('class','node')
  .call(d3.drag()
    .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on('mouseover', showTip)
  .on('mousemove', moveTip)
  .on('mouseout',  hideTip)
  .on('click',     showPanel);

// 모양 그리기
nodeSel.each(function(d) {
  const el = d3.select(this);
  const c = typeConfig[d.type];
  const s = d.size;
  const g2 = el.append('g').attr('class','node-shape');
  switch(c.shape) {
    case 'circle':
      g2.append('circle').attr('r',s).attr('fill',c.color+'2a').attr('stroke',c.color).attr('stroke-width',d.type==='core'?2.5:1.8);
      break;
    case 'rect':
      g2.append('rect').attr('x',-s).attr('y',-s*0.65).attr('width',s*2).attr('height',s*1.3).attr('rx',3).attr('fill',c.color+'2a').attr('stroke',c.color).attr('stroke-width',1.5);
      break;
    case 'diamond': {
      const p = [[0,-s],[s*0.7,0],[0,s],[-s*0.7,0]].map(p=>p.join(',')).join(' ');
      g2.append('polygon').attr('points',p).attr('fill',c.color+'2a').attr('stroke',c.color).attr('stroke-width',1.5);
      break;
    }
    case 'hexagon': {
      const h = d3.range(6).map(i=>{const a=(Math.PI/3)*i-Math.PI/6; return [Math.cos(a)*s,Math.sin(a)*s].join(',');}).join(' ');
      g2.append('polygon').attr('points',h).attr('fill',c.color+'2a').attr('stroke',c.color).attr('stroke-width',1.5);
      break;
    }
    case 'triangle': {
      const t2 = [[0,-s],[s*0.9,s*0.7],[-s*0.9,s*0.7]].map(p=>p.join(',')).join(' ');
      g2.append('polygon').attr('points',t2).attr('fill',c.color+'2a').attr('stroke',c.color).attr('stroke-width',1.5);
      break;
    }
    case 'roundrect':
      g2.append('rect').attr('x',-s).attr('y',-s*0.65).attr('width',s*2).attr('height',s*1.3).attr('rx',s*0.5).attr('fill',c.color+'2a').attr('stroke',c.color).attr('stroke-width',1.5).attr('stroke-dasharray','4,2');
      break;
  }
});

// PDF 번호 배지
nodeSel.append('text')
  .attr('text-anchor','middle').attr('dominant-baseline','middle')
  .attr('font-size', d => d.type==='core' ? '11px' : '9px')
  .attr('font-weight','700')
  .attr('fill', d => typeConfig[d.type].color)
  .text(d => d.pdfNo);

// 라벨
nodeSel.append('text')
  .attr('class','node-label')
  .attr('text-anchor','middle')
  .attr('font-size', d => d.type==='core' ? '11px' : '9px')
  .attr('font-weight', d => d.type==='core' ? '700' : '400')
  .attr('fill', d => typeConfig[d.type].color)
  .attr('dy', d => d.size + 11)
  .each(function(d) {
    const lines = d.label.split('\n');
    const el2 = d3.select(this);
    lines.forEach((line, i) => {
      el2.append('tspan').attr('x',0).attr('dy', i===0 ? 0 : '1.1em').text(line);
    });
  });

// ── Tick ──────────────────────────────────────────────────────
sim.on('tick', () => {
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  linkLabelSel.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-3);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

// ── Zoom ──────────────────────────────────────────────────────
svg.call(d3.zoom().scaleExtent([0.15,5]).on('zoom',e=>g.attr('transform',e.transform)));

// ── Tooltip ───────────────────────────────────────────────────
const tt = d3.select('#tooltip');
const typeLabel = {core:'핵심법률',law:'법률',decree:'대통령령',rule:'부령·규칙',guideline:'예규·지침·고시',regional:'경상북도 지역'};

function showTip(e,d) {
  const hasId = d.law_id && d.law_id !== '-';
  tt.style('display','block').html(`
    <div class="tt-title">${d.label.replace(/\n/g,' ')}</div>
    <div class="tt-sub">${typeLabel[d.type]} · ${d.group} · PDF ${d.pdfNo}번</div>
    ${hasId ? `<div style="color:#666;font-size:10px;margin-bottom:4px">법령ID: ${d.law_id} · 공포: ${d.enacted}</div>` : '<div style="color:#555;font-size:10px;margin-bottom:4px">법제처 미등록 (예규/지침/조례)</div>'}
    <div class="tt-desc">${d.desc}</div>
  `);
  moveTip(e);
}
function moveTip(e) {
  const tx=e.clientX+14, ty=e.clientY-10;
  tt.style('left',Math.min(tx,W-280)+'px').style('top',Math.max(10,ty)+'px');
}
function hideTip() { tt.style('display','none'); }

// ── Info Panel ────────────────────────────────────────────────
function showPanel(e,d) {
  e.stopPropagation();
  const conn = new Set([d.id]);
  links.forEach(l => {
    if(l.source.id===d.id) conn.add(l.target.id);
    if(l.target.id===d.id) conn.add(l.source.id);
  });
  nodeSel.classed('highlighted', n=>n.id===d.id).classed('dimmed', n=>!conn.has(n.id));
  linkSel.classed('highlighted', l=>l.source.id===d.id||l.target.id===d.id)
         .classed('dimmed', l=>l.source.id!==d.id&&l.target.id!==d.id);

  const out = links.filter(l=>l.source.id===d.id);
  const inp = links.filter(l=>l.target.id===d.id);
  const bc  = typeConfig[d.type].color;
  const hasId = d.law_id && d.law_id!=='-';

  let html = `
    <span class="ip-close" onclick="closePanel()">✕</span>
    <div class="ip-title">${d.label.replace(/\n/g,' ')}</div>
    <span class="ip-badge" style="background:${bc}22;color:${bc};border:1px solid ${bc}44">${typeLabel[d.type]}</span>
    <div style="color:#aaa;font-size:10px;line-height:1.6;margin-bottom:6px">${d.desc}</div>
    <div class="ip-section">기본 정보</div>
    <div class="ip-item">PDF 순서: <span>${d.pdfNo}번</span></div>
    <div class="ip-item">분류 그룹: <span>${d.group}</span></div>
    ${hasId ? `<div class="ip-item">법령ID: <span>${d.law_id}</span></div><div class="ip-item">MST: <span>${d.mst}</span></div><div class="ip-item">최종공포: <span>${d.enacted}</span></div>` : '<div class="ip-item" style="color:#555">법제처 미등록 법령</div>'}
  `;
  if(out.length) {
    html += `<div class="ip-section">위임/연계 → (${out.length}건)</div>`;
    out.forEach(l => {
      const t2 = nodes.find(n=>n.id===l.target.id);
      if(t2) html += `<div class="ip-item">▸ ${t2.label.replace(/\n/g,' ')} <span>[${l.label}]</span></div>`;
    });
  }
  if(inp.length) {
    html += `<div class="ip-section">← 연결 법령 (${inp.length}건)</div>`;
    inp.forEach(l => {
      const s2 = nodes.find(n=>n.id===l.source.id);
      if(s2) html += `<div class="ip-item">◂ ${s2.label.replace(/\n/g,' ')} <span>[${l.label}]</span></div>`;
    });
  }

  const panel = document.getElementById('info-panel');
  panel.innerHTML = html; panel.style.display = 'block';
}
function closePanel() {
  document.getElementById('info-panel').style.display='none';
  nodeSel.classed('highlighted',false).classed('dimmed',false);
  linkSel.classed('highlighted',false).classed('dimmed',false);
}
svg.on('click', () => closePanel());

// ── 검색 ──────────────────────────────────────────────────────
function searchNode(q) {
  const el = document.getElementById('node-count');
  if(!q.trim()) {
    nodeSel.classed('highlighted',false).classed('dimmed',false);
    linkSel.classed('highlighted',false).classed('dimmed',false);
    el.textContent = '';
    return;
  }
  const matched = new Set(nodes.filter(n=>n.label.includes(q)||n.group.includes(q)||String(n.pdfNo).includes(q)).map(n=>n.id));
  el.textContent = `${matched.size}건`;
  nodeSel.classed('highlighted',d=>matched.has(d.id)).classed('dimmed',d=>!matched.has(d.id));
  linkSel.classed('dimmed',true).classed('highlighted',false);
}

// ── 그룹 라벨 (배경) ──────────────────────────────────────────
const groupLabels = [
  { key:'edu_system', label:'교육제도', cx:CX-280, cy:CY-290 },

  { key:'punish',     label:'징계·비위', cx:CX+290, cy:CY+130 },
  { key:'appeal',     label:'소청·교권', cx:CX,      cy:CY+390 },
  { key:'pay',        label:'보수·연금', cx:CX-290, cy:CY+130 },
  { key:'award',      label:'상훈',      cx:CX-430, cy:CY-30  },
  { key:'local_gov',  label:'지방교육자치', cx:CX-330, cy:CY-130 },
  { key:'student',    label:'학생보호',  cx:CX+450, cy:CY+50  },
